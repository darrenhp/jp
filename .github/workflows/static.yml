# Workflow for deploying the static Japanese-intro site to GitHub Pages.
# Only the actual site files (index.html, pages/, assets/) are published,
# so repo internals like package.json / README.md / .gitignore stay private.
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Assemble ONLY the website into dist/ (excludes repo internals).
      # .git and .github are already excluded by upload-pages-artifact.
      - name: Assemble site
        run: |
          rm -rf dist
          mkdir -p dist
          cp -r index.html pages assets dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish just the assembled site
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
