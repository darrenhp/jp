<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日本語の世界 · 日语综合介绍</title>
  <meta name="description" content="和风日语综合介绍：历史、文字、语法、发音、日常用语、输入法、JLPT、音乐与文化。每个模块独立成页，配交互式知识导图。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/vendor/jsmind/jsmind.css" />
</head>
<body>
  <div class="sakura-layer" id="sakuraLayer" aria-hidden="true"></div>

  <header class="topnav" id="topnav"></header>

  <section class="hub-hero">
    <span class="hbadge">和风 · 日语综览</span>
    <h1>日本語の世界</h1>
    <p>一个现代化、交互性强的日语综合介绍站。从汉字与假名的混写之美，到动词在句尾的优雅秩序——十个模块，各自成页，由一张交互式知识导图串联。</p>
  </section>

  <section class="hub-section" id="mindmap">
    <div class="hs-head">
      <h2>交互式知识导图</h2>
      <p>日语知识体系一图总览。点击节点跳转对应模块，拖拽平移、滚轮缩放，可切换「导图 / 列表」视图并全屏查看。</p>
    </div>
    <div class="mindmap-toolbar">
      <button class="mm-btn active" id="mmViewGraph">导图视图</button>
      <button class="mm-btn" id="mmViewList">列表视图</button>
      <button class="mm-btn" id="mmExpandAll">全部展开</button>
      <button class="mm-btn" id="mmCollapseAll">全部折叠</button>
      <button class="mm-btn" id="mmFit">回到中心</button>
      <button class="mm-btn" id="mmFull">⛶ 全屏</button>
      <span class="mm-hint">点击节点跳转对应模块 · 节点上的 +/− 可展开折叠</span>
    </div>
    <div class="mindmap-wrap" id="mindmapWrap">
      <div class="mindmap-canvas" id="mindmapCanvas"></div>
      <div class="mindmap-list" id="mindmapList"></div>
    </div>
  </section>

  <section class="hub-section" id="modules">
    <div class="hs-head">
      <h2>十大模块</h2>
      <p>每个模块都是独立子页面，含左侧边栏结构导航与页内目录，内容详实可深读。</p>
    </div>
    <div class="mod-grid" id="modGrid"></div>
  </section>

  <footer class="site-foot">
    <p>日本語の世界 · 和风日语综览 ｜ 内容仅供学习参考</p>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/vendor/jsmind/jsmind.js"></script>
  <script src="assets/js/mindmap.js"></script>
  <script src="assets/js/hub.js"></script>
</body>
</html>
